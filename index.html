<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English for Professions - MVP</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    h1, h2, h3 {
      margin: 0 0 12px 0;
      font-weight: 600;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    select, textarea, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      font-size: 15px;
      margin-bottom: 12px;
    }

    textarea {
      min-height: 90px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: #2d5;
      color: #111;
      border: none;
    }

    .result {
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      background: #202820;
      border: 1px solid #3f6;
    }
  </style>
</head>

<body>

<div class="wrap">

<h1>Conversa Profissional em Inglês</h1>

<div class="card">
  <label>Profissão</label>
  <select id="profession" onchange="loadScenarios()">
    <option value="">-- Escolha --</option>
    <option value="eng">Engenharia</option>
    <option value="avi">Aviação</option>
    <option value="data">Dados & Tecnologia</option>
  </select>
</div>

<div class="card">
  <label>Nível</label>
  <button onclick="setLevel('Iniciante')">Iniciante</button>
  <button onclick="setLevel('Intermediário')">Intermediário</button>
  <button onclick="setLevel('Avançado')">Avançado</button>
  <p id="level"></p>
</div>

<div class="card">
  <label>Situação</label>
  <select id="scenario"></select>
  <button onclick="loadScenario()">Carregar</button>
  <p id="context"></p>
</div>

<div class="card">
  <label>Ou descreva sua situação</label>
  <textarea id="customText"></textarea>
  <button onclick="sendCustom()">Enviar</button>
  <div id="customResult" class="result"></div>
</div>

<div class="card">
  <h3>Palavras-chave</h3>
  <ul id="keywords"></ul>
</div>

</div>

<script>

const API = "https://english-professions-mvp.onrender.com";

function setLevel(l){
  document.getElementById('level').innerText='Nível: '+l;
}

async function loadScenarios(){
 let prof = document.getElementById('profession').value;
 let select = document.getElementById('scenario');
 select.innerHTML = '';

 if(!prof) return;

 let res = await fetch(`${API}/scenarios?profession=${prof}`);
 let data = await res.json();

 data.forEach(s => {
   let opt = document.createElement('option');
   opt.value = s.id;
   opt.text = s.title;
   select.appendChild(opt);
 });
}

async function loadScenario(){
 let scenarioId = document.getElementById('scenario').value;
 let kw = document.getElementById('keywords');
 kw.innerHTML = '';

 if(!scenarioId) return;

 let resScenario = await fetch(`${API}/scenario?id=${scenarioId}`);
 let scenario = await resScenario.json();

 document.getElementById('context').innerText = scenario.context;

 let res = await fetch(`${API}/keywords?scenario=${scenarioId}`);
 let keywords = await res.json();

 keywords.forEach(k => {
   let li = document.createElement('li');
   li.innerText = k.word + ' - ' + k.pronunciation;
   kw.appendChild(li);
 });
}

async function sendCustom(){
  const text = document.getElementById('customText').value;
  const profession = document.getElementById('profession').value;
  const level = document.getElementById('level').innerText;

  if(!text){
    document.getElementById('customResult').innerText = "Digite algo";
    return;
  }

  let res = await fetch(`${API}/scenario-custom`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ profession, level, text })
  });

  let data = await res.json();

  if(data.success){
    document.getElementById('customResult').innerText = "Enviado";
    document.getElementById('customText').value = "";
  } else {
    document.getElementById('customResult').innerText = "Erro";
  }
}

</script>

</body>
</html>
